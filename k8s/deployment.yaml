apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-ai-store
  labels:
    app: nova-ai-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nova-ai-store
  template:
    metadata:
      labels:
        app: nova-ai-store
    spec:
      containers:
      - name: nova-ai-store
        image: nova-ai-store:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: nova-secret
              key: anthropic-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
