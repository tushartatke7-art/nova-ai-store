---
# ── Playbook 1: Install Docker ────────────────────
# Run with: ansible-playbook -i inventory.ini install-docker.yml
# What it does: installs Docker on any Ubuntu server automatically

- name: Install Docker on NOVA servers
  hosts: nova_servers
  become: true        # means: run as sudo

  tasks:

    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user | default('ubuntu') }}"
        groups: docker
        append: yes

    - name: Verify Docker is installed
      command: docker --version
      register: docker_version

    - name: Print Docker version
      debug:
        msg: "✅ Docker installed: {{ docker_version.stdout }}"
