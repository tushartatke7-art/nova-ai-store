name: BrewMind AI — CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven        # Caches Maven deps between runs

      # Step 3: Build with Maven
      - name: Build with Maven
        run: mvn package -DskipTests -q

      # Step 4: Run tests
      - name: Run tests
        run: mvn test
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

      # Step 5: Build Docker image
      - name: Build Docker image
        run: docker build -t brewmind-ai:${{ github.sha }} .

      # Step 6: Show image size
      - name: Show image info
        run: docker images brewmind-ai

      # Step 7: Smoke test — start container and hit health endpoint
      - name: Smoke test
        run: |
          docker run -d -p 8080:8080 \
            -e CLAUDE_API_KEY=test \
            --name brewmind-test \
            brewmind-ai:${{ github.sha }}
          sleep 15
          curl -f http://localhost:8080/api/health
          docker stop brewmind-test

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()

    steps:
      - name: Pipeline Summary
        run: |
          echo "=================================="
          echo " BrewMind AI CI Pipeline Result"
          echo " Status: ${{ needs.build-and-test.result }}"
          echo " Commit: ${{ github.sha }}"
          echo " Branch: ${{ github.ref_name }}"
          echo "=================================="
